<!doctype html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://timestamp-js.netlify.app/timestamp-social-preview.png"
    />
    <meta name="twitter:image:alt" content="Timestamp immutable date and time helpers" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://timestamp-js.netlify.app/" />
    <meta property="og:site_name" content="Timestamp" />
    <meta
      property="og:image"
      content="https://timestamp-js.netlify.app/timestamp-social-preview.png"
    />
    <meta
      property="og:image:secure_url"
      content="https://timestamp-js.netlify.app/timestamp-social-preview.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />
    <meta property="og:image:alt" content="Timestamp immutable date and time helpers" />

    <link rel="icon" type="image/svg+xml" href="/timestamp-logo.svg" />
  </head>
  <body>
    <!-- quasar:entry-point -->
  </body>
</html>
